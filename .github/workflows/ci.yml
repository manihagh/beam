name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  build-check:
    name: Wrangler dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Copy example config so wrangler can parse
        run: cp wrangler.example.toml wrangler.toml
      - name: Wrangler deploy --dry-run
        run: npx wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_ACCOUNT_ID: dummy
